<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>图标转换 - 高湖村 TabBar 图标</title>
<style>
  body { font-family: -apple-system, 'PingFang SC', sans-serif; max-width: 680px; margin: 40px auto; padding: 20px; background: #F7F4F0; }
  h2 { color: #3D7A7C; text-align: center; font-size: 24px; }
  .sub { text-align: center; color: #A09888; margin-bottom: 28px; }
  .icons { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin: 20px 0; }
  .icon-card { background: #fff; border-radius: 12px; padding: 14px 10px 8px; text-align: center; box-shadow: 0 2px 8px rgba(44,36,22,0.06); width: 100px; }
  .icon-card canvas { display: block; margin: 0 auto; }
  .icon-card p { margin: 8px 0 0; font-size: 11px; color: #6B6255; }
  button { display: block; margin: 28px auto; padding: 14px 48px; font-size: 17px; background: linear-gradient(135deg, #3D7A7C, #5A9FA0); color: #fff; border: none; border-radius: 50px; cursor: pointer; font-weight: 600; letter-spacing: 2px; box-shadow: 0 4px 16px rgba(61,122,124,0.3); }
  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.5; cursor: default; }
  .done { text-align: center; font-size: 15px; min-height: 24px; margin-top: 12px; }
  .done.ok { color: #6B9E5A; }
  .done.err { color: #D9544B; }
</style>
</head>
<body>

<h2>高湖村 TabBar 图标生成器</h2>
<p class="sub">点击按钮，10 个图标自动下载为 81x81 PNG</p>

<div class="icons" id="icons"></div>

<button onclick="downloadAll()" id="btn">一键下载全部 PNG</button>
<p class="done" id="msg"></p>
<p style="text-align:center;color:#A09888;font-size:13px;margin-top:20px;">下载后将 PNG 文件放入项目的 images/tabbar/ 目录即可</p>

<script>
const SVG_DATA = {
  'home': '<svg xmlns="http://www.w3.org/2000/svg" width="81" height="81" viewBox="0 0 81 81" fill="none"><path d="M14 36L40.5 14L67 36V64C67 66.2 65.2 68 63 68H18C15.8 68 14 66.2 14 64V36Z" stroke="#A09888" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M30 68V44H51V68" stroke="#A09888" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  'home-active': '<svg xmlns="http://www.w3.org/2000/svg" width="81" height="81" viewBox="0 0 81 81" fill="none"><path d="M14 36L40.5 14L67 36V64C67 66.2 65.2 68 63 68H18C15.8 68 14 66.2 14 64V36Z" fill="#3D7A7C" stroke="#3D7A7C" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><path d="M30 68V44H51V68" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  'category': '<svg xmlns="http://www.w3.org/2000/svg" width="81" height="81" viewBox="0 0 81 81" fill="none"><rect x="12" y="12" width="24" height="24" rx="5" stroke="#A09888" stroke-width="4"/><rect x="45" y="12" width="24" height="24" rx="5" stroke="#A09888" stroke-width="4"/><rect x="12" y="45" width="24" height="24" rx="5" stroke="#A09888" stroke-width="4"/><rect x="45" y="45" width="24" height="24" rx="5" stroke="#A09888" stroke-width="4"/></svg>',
  'category-active': '<svg xmlns="http://www.w3.org/2000/svg" width="81" height="81" viewBox="0 0 81 81" fill="none"><rect x="12" y="12" width="24" height="24" rx="5" fill="#3D7A7C"/><rect x="45" y="12" width="24" height="24" rx="5" fill="#3D7A7C"/><rect x="12" y="45" width="24" height="24" rx="5" fill="#3D7A7C"/><rect x="45" y="45" width="24" height="24" rx="5" fill="#3D7A7C"/></svg>',
  'publish': '<svg xmlns="http://www.w3.org/2000/svg" width="81" height="81" viewBox="0 0 81 81" fill="none"><circle cx="40.5" cy="40.5" r="28" fill="#E8A840"/><path d="M40.5 22V59M22 40.5H59" stroke="#fff" stroke-width="5" stroke-linecap="round"/></svg>',
  'publish-active': '<svg xmlns="http://www.w3.org/2000/svg" width="81" height="81" viewBox="0 0 81 81" fill="none"><circle cx="40.5" cy="40.5" r="28" fill="#E89820"/><path d="M40.5 22V59M22 40.5H59" stroke="#fff" stroke-width="5" stroke-linecap="round"/></svg>',
  'board': '<svg xmlns="http://www.w3.org/2000/svg" width="81" height="81" viewBox="0 0 81 81" fill="none"><path d="M16 18H65C67.2 18 69 19.8 69 22V48C69 50.2 67.2 52 65 52H44L28 66V52H16C13.8 52 12 50.2 12 48V22C12 19.8 13.8 18 16 18Z" stroke="#A09888" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  'board-active': '<svg xmlns="http://www.w3.org/2000/svg" width="81" height="81" viewBox="0 0 81 81" fill="none"><path d="M16 18H65C67.2 18 69 19.8 69 22V48C69 50.2 67.2 52 65 52H44L28 66V52H16C13.8 52 12 50.2 12 48V22C12 19.8 13.8 18 16 18Z" fill="#3D7A7C" stroke="#3D7A7C" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  'profile': '<svg xmlns="http://www.w3.org/2000/svg" width="81" height="81" viewBox="0 0 81 81" fill="none"><circle cx="40.5" cy="27" r="13" stroke="#A09888" stroke-width="4"/><path d="M16 68C16 54.5 27 43.5 40.5 43.5C54 43.5 65 54.5 65 68" stroke="#A09888" stroke-width="4" stroke-linecap="round"/></svg>',
  'profile-active': '<svg xmlns="http://www.w3.org/2000/svg" width="81" height="81" viewBox="0 0 81 81" fill="none"><circle cx="40.5" cy="27" r="13" fill="#3D7A7C"/><path d="M16 68C16 54.5 27 43.5 40.5 43.5C54 43.5 65 54.5 65 68" fill="#3D7A7C" stroke="#3D7A7C" stroke-width="3" stroke-linecap="round"/></svg>'
};

const FILES = [
  'home','home-active','category','category-active','publish','publish-active',
  'board','board-active','profile','profile-active'
];

function svgToPng(svgText, size) {
  return new Promise((resolve) => {
    const canvas = document.createElement('canvas');
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext('2d');
    const img = new Image();
    img.onload = () => { ctx.drawImage(img, 0, 0, size, size); resolve(canvas); };
    img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgText);
  });
}

(async () => {
  const container = document.getElementById('icons');
  for (const name of FILES) {
    const canvas = await svgToPng(SVG_DATA[name], 81);
    const card = document.createElement('div');
    card.className = 'icon-card';
    card.appendChild(canvas);
    const p = document.createElement('p');
    p.textContent = name.replace('-active','').replace('-',' ') + (name.includes('active') ? ' active' : '');
    card.appendChild(p);
    container.appendChild(card);
  }
})();

async function downloadAll() {
  const btn = document.getElementById('btn');
  const msg = document.getElementById('msg');
  btn.disabled = true;
  btn.textContent = '...';
  msg.className = 'done';
  msg.textContent = '';

  for (const name of FILES) {
    const canvas = await svgToPng(SVG_DATA[name], 81);
    const a = document.createElement('a');
    const finalName = name.replace('-active','') + (name.includes('active') ? '-active' : '') + '.png';
    a.href = canvas.toDataURL('image/png');
    a.download = finalName;
    a.click();
    await new Promise(r => setTimeout(r, 150));
  }

  btn.disabled = false;
  btn.textContent = '一键下载全部 PNG';
  msg.className = 'done ok';
  msg.textContent = '下载完成！请将 10 个 PNG 文件放入 images/tabbar/ 目录';
}
</script>
</body>
</html>
